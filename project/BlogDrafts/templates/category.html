<div class="max-w-4xl mx-auto px-6 py-12">

  <!-- Existing Categories -->
  <div class="mb-8">
    <h2 class="text-xl font-semibold mb-4">All Categories</h2>

    <div class="flex flex-wrap gap-3">
      {% for category in data %}
        <span class="px-4 py-2 flex gap-2 bg-gray-100 rounded-full text-sm">
          {{ category.name }}
          <form method="POST" action="">
          {% csrf_token %}
          <button 
            name = 'delete_category'
            value={{category.id}}
            type="submit"
            class="text-red-500 hover:text-red-700 text-xs font-bold"
          >
          ✕
        </button>
      </form>
        </span>
      {% empty %}
        <p class="text-gray-500">No categories yet</p>
      {% endfor %}
    </div>
  </div>

  <!-- Heading -->
  <div class="text-center mb-10">
    <h1 class="text-4xl font-bold text-foreground">
      Create New Category
    </h1>
  </div>

  <!-- Form Card -->
  <div class="bg-layer border border-layer-line rounded-xl shadow-sm p-8">

    <form method="POST">
      {% csrf_token %}

      <div class="space-y-6">

        <!-- Category Name -->
        <div>
          <label class="block mb-2 text-sm font-medium text-foreground">
            Category Name
          </label>
          <input 
            type="text"
            name="category"
            required
            placeholder="Enter category name..."
            class="w-full py-3 px-4 rounded-lg border border-layer-line"
          >
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          name="add_category"
          class="w-full py-3 text-sm font-semibold rounded-lg bg-blue-600 text-white hover:bg-blue-700 transition"
        >
          Create Category
        </button>

      </div>

    </form>

  </div>

</div>
