{% load static %}
<div class="shadow-sm sticky top-0 bg-white z-50">

    <nav class="py-3">
        <div class="container mx-auto px-4 flex items-center justify-between">

            <!-- Logo -->
            <a href="{% url 'home' %}" class="text-xl font-bold text-indigo-600">
                The Daily Draft
            </a>

            <!-- Mobile Toggle -->
            <button id="navbar-toggle"
                class="md:hidden border px-3 py-1 rounded text-gray-600 hover:bg-gray-100">
                <img src="{% static 'images/menu.png' %}" class="w-5" alt="">
            </button>

            <!-- Menu -->
            <div id="navbar-collapse"
                class="hidden md:flex flex-col md:flex-row md:items-center md:space-x-2 mt-4 md:mt-0 w-full md:w-auto">

                <!-- Links -->
                <a href="{% url 'home' %}"
                    class="px-4 py-2 rounded bg-indigo-600 text-white font-medium">
                    Home
                </a>

                <a href="{% url 'pricing' %}"
                    class="px-4 py-2 rounded text-gray-600 hover:bg-gray-100 transition">
                    Pricing
                </a>

                <a href="{% url 'blogs' %}"
                    class="px-4 py-2 rounded text-gray-600 hover:bg-gray-100 transition">
                    Drafts
                </a>

                {% if user.is_authenticated %}

                <a href="{% url 'create' %}"
                    class="px-4 py-2 rounded text-gray-600 hover:bg-gray-100 transition">
                    Build
                </a>

                {% if user.is_superuser %}
                    <a href="/admin/"
                        class="px-4 py-2 rounded text-gray-600 hover:bg-gray-100 transition">
                        Dashboard
                    </a>
                {% endif %}

                <!-- Profile -->
                <a href="#"
                    class="flex items-center gap-2 px-3 py-2 rounded-full bg-gray-100 hover:bg-gray-200 transition">

                    <div
                        class="w-8 h-8 flex items-center justify-center rounded-full bg-indigo-500 text-white font-bold">
                        {{ user.username|first|upper }}
                    </div>

                    <span class="text-sm font-medium text-gray-800">
                        {{ user.username }}
                    </span>
                </a>

                <!-- Logout -->
                <a href="{% url 'logout' %}"
                    class="px-4 py-2 rounded border border-red-500 text-red-600 hover:bg-red-500 hover:text-white transition">
                    Logout
                </a>

                {% else %}

                <a href="{% url 'login' %}"
                    class="px-4 py-2 text-indigo-600 hover:bg-indigo-50 rounded transition">
                    Login
                </a>

                <a href="{% url 'register' %}"
                    class="px-4 py-2 border border-indigo-600 text-indigo-600 rounded hover:bg-indigo-600 hover:text-white transition">
                    Register
                </a>

                {% endif %}
            </div>
        </div>
    </nav>
</div>
